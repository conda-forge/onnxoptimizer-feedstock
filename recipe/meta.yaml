{% set name = "onnxoptimizer" %}
{% set version = "0.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/onnxoptimizer-{{ version }}.tar.gz
  sha256: dac4a972b5dc80a870b930e85e4b043d090d4546d7878106ef8448e07f94622e

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  build:
    - cmake
    - make
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - pytest-runner
  run:
    - python
    - onnx

test:
  imports:
    - onnxoptimizer
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/onnx/optimizer
  summary: Actively maintained ONNX Optimizer
  license: Apache-2.0
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - neNasko1
